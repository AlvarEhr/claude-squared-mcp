name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke tests (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (editable)
        run: pip install -e .

      - name: Run v0.8 smoke tests
        env:
          PYTHONIOENCODING: utf-8
        run: python tests/smoke_v08.py

      - name: Run v0.8.1 + v0.8.2 smoke tests
        env:
          PYTHONIOENCODING: utf-8
        run: python tests/smoke_v081.py
